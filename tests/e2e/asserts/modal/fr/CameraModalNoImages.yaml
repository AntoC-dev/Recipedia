appId: "com.recipedia"
---

- assertVisible:
    id: "ModalImageSelect::ExplanationText"
    text: "Choisissez une image:"
    label: "Explanation text of the modal is rendered in french"
- assertVisible:
    id: "Modal::Camera::RoundButton"
    label: "Camera button has the right icon"
- assertVisible:
    id: "Modal::Camera::RoundButton::Label"
    text: "Prendre une nouvelle photo"
    label: "Gallery button is rendered"
- assertVisible:
    id: "Modal::Gallery::RoundButton::Label"
    label: "Gallery button has the right icon"
- assertVisible:
    id: "Modal::Gallery::RoundButton::Label"
    text: "Choisir depuis la galerie"
