appId: "com.recipedia"
---
# Assert accordion is NOT displayed
- runFlow:
    when:
      platform: Android
    commands:
      - assertNotVisible:
          text: "Bread"
          label: "Bread accordion not displayed on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - assertNotVisible:
          text: "Bread, 󰅀"
          label: "Bread accordion not displayed on iOS"
