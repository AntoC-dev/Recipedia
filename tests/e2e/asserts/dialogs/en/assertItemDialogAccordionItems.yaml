- tapOn:
    id: "${MODAL_TEST_ID}::SeasonalityCalendar"
    label: "Expand seasonality accordion to verify months"

- extendedWaitUntil:
    visible:
      id: "${MODAL_TEST_ID}::SeasonalityCalendar::.*"
    timeout: 5000
    label: "Wait for seasonality accordion to be expanded"

- assertVisible:
    id: "${MODAL_TEST_ID}::SeasonalityCalendar::1"
    text: '(󰄬,\s*)?January'
    label: "Assert - January is visible"

- scrollUntilVisible:
    element:
