appId: "com.recipedia"
---
- tapOn:
    id: "${MODAL_TEST_ID}::TypeAccordion"
    label: "Expand type accordion to verify items"

- extendedWaitUntil:
    visible:
      id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.*"
    timeout: 5000
    label: "Wait for type accordion to be expanded"

- scrollUntilVisible:
    element:
      id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.baking"
    direction: DOWN
    speed: 20
    label: "Action - Scroll to baking ingredient type"

- waitForAnimationToEnd:
    label: "Wait for scroll animation to end"

- assertVisible:
    id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.baking"
    text: "Baking"
    label: "Assert - Baking type item is visible"

