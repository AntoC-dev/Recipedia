appId: "com.recipedia"
---
- assertVisible:
    id: "${MODAL_TEST_ID}::TypeAccordion"
    text: "Type, ${TYPE_DESCRIPTION}"
    label: "Type accordion header with description is visible"

- assertVisible:
    id: "${MODAL_TEST_ID}::SeasonalityCalendar"
    text: "Seasonality, ${SEASONALITY_DESCRIPTION}"
    label: "Seasonality accordion header with description is visible"

- runFlow:
    file: "assertItemDialogAccordionItems.yaml"
    env:
      MODAL_TEST_ID: "${MODAL_TEST_ID}"
    label: "Assert - Verify all type and seasonality accordion items"
