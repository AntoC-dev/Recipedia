appId: "com.recipedia"
---
- runFlow:
    when:
      platform: Android
    commands:
      - assertVisible:
          id: "${MODAL_TEST_ID}::TypeAccordion"
          text: "Type"
          label: "Type accordion is visible on android"
      - assertVisible:
          id: "${MODAL_TEST_ID}::SeasonalityCalendar"
          text: "Saisonnalité"
          label: "Seasonality accordion is visible in French on android"

- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible:
          id: "${MODAL_TEST_ID}::TypeAccordion"
          text: "Type, ${TYPE_IOS_SUFFIX}󰅀"
          label: "Type accordion is visible on ios"
      - assertVisible:
          id: "${MODAL_TEST_ID}::SeasonalityCalendar"
          text: "Saisonnalité, 󰅀"
          label: "Seasonality accordion is visible in French on ios"

- tapOn:
    id: "${MODAL_TEST_ID}::TypeAccordion"
    label: "Expand type accordion to verify items"

- extendedWaitUntil:
      visible:
          id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.cereal"
      timeout: 5000
      label: "Wait for type accordion to be expanded"

- assertVisible:
    id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.cereal"
    text: "Céréales"
    label: "Assert - Céréales type item is visible"

- scrollUntilVisible:
      element:
          id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.condiment"
      direction: DOWN
      speed: 20
      centerElement: true
      label: "Action - Scroll to condiment ingredient type"

- waitForAnimationToEnd:
      label: "Wait for scroll animation to end"

- assertVisible:
    id: "${MODAL_TEST_ID}::TypeAccordion::ingredientTypes.condiment"
    text: "Condiments"
    label: "Assert - Condiments type item is visible"

