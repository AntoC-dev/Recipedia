appId: "com.recipedia"
---
- assertVisible:
    id: "${MODAL_TEST_ID}::TypeAccordion"
    text: "Type"
    label: "Type accordion header text is visible"

- assertVisible:
    id: "${MODAL_TEST_ID}::SeasonalityCalendar"
    text: "Saisonnalité"
    label: "Seasonality accordion header text is visible in French"

- runFlow:
    file: "assertItemDialogAccordionItems.yaml"
    env:
      MODAL_TEST_ID: "${MODAL_TEST_ID}"
    label: "Assert - Verify all type and seasonality accordion items in French"
