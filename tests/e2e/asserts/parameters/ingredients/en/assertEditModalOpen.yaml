appId: "com.recipedia"
---
- assertVisible:
    id: "IngredientsSettings::ItemDialog::EditModal::Title"
    text: "Edit ingredient"
    label: "Edit ingredient modal title is displayed"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::EditModal::FormHint"
    text: "Name and type are required. The more details you provide, the better your experience."
    label: "Form hint text is displayed"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    text: "Lettuce"
    label: "Ingredient name input field shows current value"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::EditModal::Unit::CustomTextInput"
    label: "Unit input field is visible"

- runFlow:
    file: "../../../dialogs/en/assertItemDialogAccordionsWithDescription.yaml"
    env:
      MODAL_TEST_ID: "IngredientsSettings::ItemDialog::EditModal"
      TYPE_DESCRIPTION: "Vegetable"
      SEASONALITY_DESCRIPTION: "May, June, July, August, September, October"
      label: "Assert - Verify type and seasonality accordion headers with descriptions and items"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::EditModal::CancelButton-text"
    text: "Cancel"
    label: "Cancel button is visible"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::EditModal::ConfirmButton-text"
    text: "Save"
    label: "Save button is visible"
