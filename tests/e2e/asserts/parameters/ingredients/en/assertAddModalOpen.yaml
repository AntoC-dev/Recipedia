appId: "com.recipedia"
---
- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Title"
    text: "Add ingredient"
    label: "Add ingredient modal title is displayed"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::FormHint"
    text: "Name and type are required. The more details you provide, the better your experience."
    label: "Form hint text is displayed"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput-label-inactive"
    text: "Ingredient Name"
    label: "Ingredient name input title is displayed"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    text: ""
    label: "Ingredient name input field is visible"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Unit::CustomTextInput-label-inactive"
    text: "Unit"
    label: "Unit input title is displayed"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Unit::CustomTextInput"
    text: ""
    label: "Unit input field is visible"

- runFlow:
    file: "../../../dialogs/en/assertItemDialogAccordions.yaml"
    env:
      MODAL_TEST_ID: "IngredientsSettings::ItemDialog::AddModal"
    label: "Assert - Verify type and seasonality accordion headers and items"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::CancelButton-text"
    text: "Cancel"
    label: "Cancel button is visible"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::ConfirmButton-text"
    text: "Add"
    label: "Add button is visible"
