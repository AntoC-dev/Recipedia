appId: "com.recipedia"
---
- assertVisible:
    id: "IngredientsSettings::AppBar::Title-title-text"
    text: "Ingredients"
    label: "Ingredients Settings title is visible with correct text"

- assertVisible:
    id: "IngredientsSettings::SearchBar"
    label: "Search bar is visible"

- assertVisible:
    id: "IngredientsSettings::SearchBar-icon"
    text: "search"
    label: "Search bar icon is visible with correct text"

- assertVisible:
    id: "IngredientsSettings::SearchBar"
    text: "Search..."
    label: "Search bar has correct placeholder text"

- assertVisible:
    id: "IngredientsSettings::27::IngredientName"
    text: "Avocado"
    label: "Ingredient Avocado is displayed"

- assertVisible:
    id: "IngredientsSettings::27::EditButton"
    label: "Edit button for Avocado is displayed"

- assertVisible:
    id: "IngredientsSettings::27::DeleteButton"
    label: "Delete button for Avocado is displayed"

