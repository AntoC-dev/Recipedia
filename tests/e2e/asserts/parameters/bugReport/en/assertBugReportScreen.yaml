appId: "com.recipedia"
---
- assertVisible:
    id: "BugReport::Bar::AppBar::BackButton"
    text: "Back"
    label: "Back button is displayed"

- assertVisible:
    id: "BugReport::Bar::AppBar::Title-title-text"
    text: "Report a Bug"
    label: "Bug Report title is displayed"

- assertVisible:
    id: "BugReport::Description::Input::CustomTextInput"
    text: "Describe the issue you experienced..."
    label: "Description input is displayed"

- assertVisible:
    id: "BugReport::Description::Input::CustomTextInput-label-inactive"
    text: "What happened?"
    label: "Description inactive label is displayed"

- assertVisible:
    id: "BugReport::Screenshots::AddButton"
    text: "Add screenshot"
    label: "Add screenshot button is displayed"

- assertVisible:
    id: "BugReport::Send::Button"
    text: "Send report"
    enabled: false
    label: "Send button is displayed"
