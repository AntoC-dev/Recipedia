appId: "com.recipedia"
---
- assertVisible:
    id: "BugReport::Bar::AppBar::Title-title-text"
    text: "Signaler un bug"
    label: "Bug Report title is displayed"

- assertVisible:
    id: "BugReport::Description::Input::CustomTextInput-label-inactive"
    text: "Que s'est-il passé ?"
    label: "Description input label is displayed"

- assertVisible:
    id: "BugReport::Description::Input::CustomTextInput"
    label: "Description input field is displayed"

- assertVisible:
    id: "BugReport::Screenshots::AddButton"
    text: "Ajouter une capture"
    label: "Add screenshot button is displayed"

- assertVisible:
    id: "BugReport::Send::Button"
    text: "Envoyer le rapport"
    label: "Send button is displayed"
