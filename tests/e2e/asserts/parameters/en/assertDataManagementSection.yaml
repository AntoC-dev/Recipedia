appId: "com.recipedia"
---

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::SubHeader"
    direction: DOWN
    speed: 40
    centerElement: true
    label: "Scroll to Data Management section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::Data::SubHeader"
    label: "Data Management section header is displayed"

- assertVisible:
    text: "Data Management"
    label: "Data Management section header text is displayed"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Ingredients::Item"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to Ingredients section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::Data::Ingredients::Item"
    text: "Ingredients, Edit ingredients and their seasonality"
    label: "Ingredients item"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Tags::Item"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to Tags section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::Data::Tags::Item"
    text: "Tags, Manage recipe tags"
    label: "Tags item"

