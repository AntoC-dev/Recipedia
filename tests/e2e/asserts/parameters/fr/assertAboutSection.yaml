appId: "com.recipedia"
---
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::About::SubHeader"
    direction: DOWN
    speed: 40
    label: "Scroll to About section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::About::SubHeader"
    label: "About section header is displayed"

- assertVisible:
    text: "À propos"
    label: "About section header shows French text"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::About::Version::Item"
    direction: DOWN
    speed: 40
    centerElement: true
    label: "Scroll to version item"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::About::Version::Item"
    text: "Version, .*\\d+\\.\\d+\\.\\d+"
    label: "Version item"

- scrollUntilVisible:
    element:
      id: "Parameters::Section::About::BugReport::Item"
    direction: DOWN
    speed: 60
    centerElement: true
    label: "Scroll to Bug Report item"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::About::BugReport::Divider"
    label: "Bug Report divider is displayed"

- assertVisible:
    id: "Parameters::Section::About::BugReport::Item"
    text: "Signaler un bug, Décrivez un problème ou envoyez un retour"
    label: "Bug Report item text"

