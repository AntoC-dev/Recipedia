appId: "com.recipedia"
---
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::SubHeader"
    direction: DOWN
    speed: 60
    centerElement: true
    label: "Scroll to Data Management section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::Data::SubHeader"
    label: "Data Management section header is displayed"

- assertVisible:
    text: "Gestion des données"
    label: "Data Management section header shows French text"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Ingredients::Item"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to Ingredients section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::Data::Ingredients::Item"
    text: "Ingrédients , Modifier les ingrédients et leur saisonnalité"
    label: "Ingredients item"

- runFlow:
    file: "./assertIngredientDialogIsTranslated.yaml"
    label: "Verification - Verify ingredient type dropdown translated to French"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Tags::Item"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to Tags section"

- waitForAnimationToEnd

- assertVisible:
    id: "Parameters::Section::Data::Tags::Item"
    text: "Étiquettes, Gérer les tags de recettes"
    label: "Tags item"

