appId: "com.recipedia"
---
- tapOn:
    id: "IngredientsSettings::BottomActionButton"
    label: "Open Add ingredient dialog again"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    label: "Focus on ingredient name input"

- inputText:
    text: "Test Cancel Ingredient"
    label: "Enter an ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::CancelButton"
    label: "Cancel after entering ingredient name"

- assertNotVisible:
    text: "Test Cancel Ingredient"
    label: "Verify ingredient was not added after cancel"

- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "Test Cancel"
    label: "Search for canceled ingredient"

- assertNotVisible:
    id: "IngredientsSettings::.*::IngredientName"
    text: "Test Cancel Ingredient"
    label: "Verify ingredient was not found"

- tapOn:
    id: "IngredientsSettings::SearchBar-clear-icon"
    label: "Clear the search bar"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::1::IngredientName"
    timeout: 60000
    label: "Wait for list to show all items"
