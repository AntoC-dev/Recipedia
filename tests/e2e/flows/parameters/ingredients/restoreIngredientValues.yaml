appId: "com.recipedia"
---
- runFlow:
    file: "navigateToIngredientsSettings.yaml"
    label: "Navigate to Ingredients Settings screen"


- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "Lettuce"
    label: "Action - Search for Lettuce edited ingredient"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::0::IngredientName"
      text: "Lettuce Edited"
    timeout: 5000
    label: "Wait for the ingredient to appear in the list"

- tapOn:
    id: "IngredientsSettings::0::EditButton"
    label: "Tap Edit button for Lettuce Edited"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    label: "Focus on ingredient name input field"

- eraseText:
    label: "Clear existing ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- inputText:
    text: "Lettuce"
    label: "Restore name to 'Lettuce'"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::Menu::Button"
    label: "Open type dropdown menu"

- tapOn:
    text: "Vegetable"
    label: "Restore type to vegetable"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::Unit::CustomTextInput"
    label: "Focus on unit input field"

- eraseText:
    label: "Clear existing unit"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- inputText:
    text: "g"
    label: "Restore unit to g"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::SeasonalityCalendar::10"
    label: "Re-select october"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::ConfirmButton"
    label: "Save restored values"
