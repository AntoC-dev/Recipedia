appId: "com.recipedia"
---
- runFlow:
    file: "navigateToIngredientsSettings.yaml"
    label: "Navigate to Ingredients Settings screen"

- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "Lettuce"
    label: "Action - Search for Lettuce edited ingredient"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::7::IngredientName"
      text: "Lettuce Edited"
    timeout: 5000
    label: "Wait for the ingredient to appear in the list"

- tapOn:
    id: "IngredientsSettings::17::EditButton"
    label: "Tap Edit button for Lettuce Edited"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    label: "Focus on ingredient name input field"

- eraseText:
    label: "Clear existing ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- inputText:
    text: "Lettuce"
    label: "Restore name to 'Lettuce'"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::TypeAccordion"
    label: "Expand type accordion"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::ItemDialog::EditModal::TypeAccordion::ingredientTypes.*"
    timeout: 5000
    label: "Wait for type accordion to expand"

- scrollUntilVisible:
    element:
      id: "IngredientsSettings::ItemDialog::EditModal::TypeAccordion::ingredientTypes.vegetable"
    speed: 20
    timeout: 120000
    direction: DOWN
    label: "Action - Scroll to Vegetable item"

- waitForAnimationToEnd:
    label: "Wait for scroll animation to end"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::TypeAccordion::ingredientTypes.vegetable"
    label: "Restore type to vegetable"

- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "radio button, checked"
          timeout: 30000
          label: "Wait for item to be checked on iOS"

- scrollUntilVisible:
    element:
      id: "IngredientsSettings::ItemDialog::EditModal::TypeAccordion"
    speed: 20
    timeout: 120000
    direction: UP
    centerElement: true
    label: "Action - Scroll up to ensure type accordion is displayed"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::TypeAccordion"
    label: "Collapse type accordion"

- extendedWaitUntil:
    notVisible:
      id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.*"
    timeout: 5000
    label: "Wait for type accordion to collapse"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::Unit::CustomTextInput"
    label: "Focus on unit input field"

- runFlow:
    file: "../../waitForKeyboard.yaml"
    label: "Wait for keyboard to appear"

- eraseText:
    label: "Clear existing unit"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- inputText:
    text: "g"
    label: "Restore unit to g"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::SeasonalityCalendar"
    label: "Expand seasonality accordion"

- scrollUntilVisible:
    element:
      id: "IngredientsSettings::ItemDialog::EditModal::SeasonalityCalendar::10"
    speed: 20
    timeout: 120000
    direction: DOWN
    centerElement: true
    label: "Action - Scroll to october item"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::SeasonalityCalendar::10"
    label: "Re-select october"

- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "󰄬, October"
          timeout: 30000
          label: "Wait for item to be checked on iOS"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::ConfirmButton"
    label: "Save restored values"
