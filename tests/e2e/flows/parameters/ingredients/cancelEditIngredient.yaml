appId: "com.recipedia"
---

- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "Spaghetti"
    label: "Search for Spaghetti ingredient"

- assertVisible:
    text: "Spaghetti"
    label: "Verify Spaghetti ingredient exists in database"

- tapOn:
    id: "IngredientsSettings::0::EditButton"
    label: "Open Edit dialog for Spaghetti ingredient"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    label: "Focus on ingredient name input"

- inputText:
    text: " Modified"
    label: "Modify ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::EditModal::CancelButton"
    label: "Cancel edit operation"

- assertVisible:
    text: "Spaghetti"
    label: "Verify ingredient name unchanged after cancel"

- assertNotVisible:
    text: "Spaghetti Modified"
    label: "Verify modified name was not saved"

- tapOn:
    id: "IngredientsSettings::SearchBar-clear-icon"
    label: "Clear the search bar"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::1::IngredientName"
    timeout: 60000
    label: "Wait for list to show all items"
