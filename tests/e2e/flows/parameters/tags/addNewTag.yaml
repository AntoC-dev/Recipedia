appId: "com.recipedia"
---
- tapOn:
    id: "TagsSettings::BottomActionButton"
    label: "Tap Add button to create a new tag"

- tapOn:
    id: "TagsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    label: "Focus on tag name input field"

- inputText:
    text: "RecipeTag"
    label: "Enter new tag name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "TagsSettings::ItemDialog::AddModal::ConfirmButton"
    label: "Confirm adding the new tag"

- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "TagsSettings"
      SEARCH_QUERY: "RecipeTag"
    label: "Action - Search for RecipeTag tag"

- assertVisible:
    id: "TagsSettings::0::TagName"
    text: "RecipeTag"
    label: "Verify new tag appears in the list"

- tapOn:
    id: "TagsSettings::SearchBar-clear-icon"
    label: "Clear the search bar"

- extendedWaitUntil:
    visible:
      id: "TagsSettings::1::TagName"
    timeout: 60000
    label: "Wait for list to show all items"
