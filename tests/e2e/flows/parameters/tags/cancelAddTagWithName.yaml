appId: "com.recipedia"
---
- tapOn:
    id: "TagsSettings::BottomActionButton"
    label: "Open Add tag dialog again"

- tapOn:
    id: "TagsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    label: "Focus on tag name input"

- inputText:
    text: "Test Cancel Tag"
    label: "Enter a tag name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "TagsSettings::ItemDialog::AddModal::CancelButton"
    label: "Cancel after entering tag name"

- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "TagsSettings"
      SEARCH_QUERY: "Test Cancel"
    label: "Search for canceled tag"

- assertNotVisible:
    id: "TagsSettings::.*::TagName"
    text: "Test Cancel Tag"
      label: "Verify tag was not found"

- tapOn:
    id: "TagsSettings::SearchBar-clear-icon"
    label: "Clear the search bar"

- extendedWaitUntil:
    visible:
      id: "TagsSettings::1::TagName"
    timeout: 60000
    label: "Wait for list to show all items"
