appId: "com.recipedia"
---

- runFlow:
    file: "../searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "TagsSettings"
      SEARCH_QUERY: "Italian"
    label: "Search for Italian tag"

- tapOn:
    id: "TagsSettings::0::EditButton"
    label: "Open Edit dialog for Italian tag"

- tapOn:
    id: "TagsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    label: "Focus on tag name input"

- inputText:
    text: " Modified"
    label: "Modify tag name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "TagsSettings::ItemDialog::EditModal::CancelButton"
    label: "Cancel edit operation"

- assertVisible:
    text: "Italian"
    label: "Verify tag name unchanged after cancel"

- assertNotVisible:
    text: "Italian Modified"
    label: "Verify modified name was not saved"

- tapOn:
    id: "TagsSettings::SearchBar-clear-icon"
    label: "Clear the search bar"

- extendedWaitUntil:
    visible:
      id: "TagsSettings::1::TagName"
    timeout: 60000
    label: "Wait for list to show all items"
