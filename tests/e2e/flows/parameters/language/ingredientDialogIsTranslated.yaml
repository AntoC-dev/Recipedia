appId: "com.recipedia"
---
- tapOn:
    id: "BottomTabs::Parameters"
    label: "Navigate to Parameters screen"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Ingredients::Item"
    direction: DOWN
    speed: 80
    centerElement: true
    label: "Scroll down to find Ingredients option"

- waitForAnimationToEnd

- tapOn:
    id: "Parameters::Section::Data::Ingredients::Item"
    label: "Navigate to Ingredients Settings screen"

- tapOn:
    id: "IngredientsSettings::BottomActionButton"
    label: "Open add ingredient dialog"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Title"
    text: "Ajouter un ingrédient"
    label: "Add ingredient modal title is displayed in French"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Menu::Button-text"
    text: "Sélectionner le type"
    label: "Type dropdown shows French placeholder text"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Menu::Button"
    label: "Open the ingredient type dropdown"

- waitForAnimationToEnd

- assertVisible:
    text: "Pâtisserie"
    label: "Baking category is shown in French"

- assertVisible:
    text: "Pain"
    label: "Bread category is shown in French"

- assertVisible:
    text: "Topping"
    label: "Topping category is shown in both languages"

- assertVisible:
    text: "Céréales"
    label: "Cereal category is shown in French"

- assertNotVisible:
    text: "Baking"
    label: "English category name Baking is not shown"

- assertNotVisible:
    text: "Bread"
    label: "English category name Bread is not shown"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::CancelButton"
    label: "Dismiss the add ingredient dialog"

- waitForAnimationToEnd

- tapOn:
    id: "BottomTabs::Home"
    label: "Return to Home screen"
