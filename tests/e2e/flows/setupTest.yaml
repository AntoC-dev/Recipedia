appId: "com.recipedia"
---
- runFlow:
    file: "handleAnr.yaml"
    label: "Handle ANR in case a previous test triggered it"

- launchApp:
    clearState: true
    label: "Setup - Launch app with clean state"

- extendedWaitUntil:
    visible:
      id: "WelcomeScreen::SkipButton"
    timeout: 60000
    optional: true
    label: "Wait for welcome to be visible"

- runFlow:
    file: "handleAnr.yaml"
    label: "Handle ANR during initialization"

# clearState triggers onboarding on every launch — skip it
- extendedWaitUntil:
    visible:
      id: "WelcomeScreen::SkipButton"
    timeout: 300000
    label: "Wait for Welcome screen to be visible"

- runFlow:
    file: "handleAnr.yaml"
    label: "Handle ANR during initialization"

- tapOn:
    id: "WelcomeScreen::SkipButton"
    label: "Skip onboarding"

- extendedWaitUntil:
    notVisible:
      id: "WelcomeScreen::LoadingOverlay"
    timeout: 30000
    label: "Wait for data to load"

- extendedWaitUntil:
    visible:
      id: "NonExistentElement::ForDelay"
    timeout: 3000
    optional: true
    label: "Wait 3s before ANR check"

- runFlow:
    file: "handleAnr.yaml"
    label: "Handle ANR after data load"

- extendedWaitUntil:
    visible:
      id: "Home::RecipeRecommendation::random::Carousel::Card::0::Cover"
    timeout: 120000
    label: "Wait for app to be ready"

- runFlow:
    file: "handleAnr.yaml"
    label: "Handle ANR after home render"

# FAB IDs use regex pattern because React Native Paper adds "-container-outer-layer" suffix on iOS
- extendedWaitUntil:
    visible:
      id: "ExpandButton.*"
    timeout: 5000
    label: "Wait for FAB to be visible"

- waitForAnimationToEnd:
    timeout: 3000
    label: "Wait for FAB mount animation to complete"

- runFlow:
    file: "handleAnr.yaml"
    label: "Handle ANR after loading"

- runFlow:
    file: "warmupScreens.yaml"
    label: "Warmup screens to exhaust ANR issues"

- runFlow:
    file: "warmupKeyboard.yaml"
    label: "Warmup keyboard on iOS to prevent cold keyboard input drops"
