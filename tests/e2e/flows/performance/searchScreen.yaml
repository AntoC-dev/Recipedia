appId: "com.recipedia"
---
- tapOn:
    id: "BottomTabs::Search"
    label: "Navigate to Search screen"

- extendedWaitUntil:
    visible:
      id: "SearchScreen::SearchBar"
    timeout: 10000
    label: "Wait for Search screen to load"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Scroll down through recipe list"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Continue scrolling"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Continue scrolling"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "SearchScreen::SearchBar"
    direction: UP
    speed: 95
    label: "Scroll back to SearchBar"

- waitForAnimationToEnd

- tapOn:
    id: "SearchScreen::FiltersToggleButtons"
    label: "Open filter page"

- extendedWaitUntil:
    visible:
      id: "SearchScreen::FilterAccordion::Accordion::0"
    timeout: 5000
    label: "Wait for filter accordions"

- waitForAnimationToEnd

# Accordion index 2 is always the Tags filter (0 = in-season, 1 = prep time).
# Selecting by index avoids depending on which tag names the seed happens to
# attach to recipes, which is what the Tags filter list is derived from.
- scrollUntilVisible:
    element:
      id: "SearchScreen::FilterAccordion::Accordion::2"
    direction: DOWN
    speed: 40
    centerElement: true
    label: "Scroll to Tags accordion"

- tapOn:
    id: "SearchScreen::FilterAccordion::Accordion::2"
    label: "Expand Tags accordion"

- extendedWaitUntil:
    visible:
      id: "SearchScreen::FilterAccordion::Accordion::2::Item::.*"
    timeout: 5000
    label: "Wait for tag options"

- waitForAnimationToEnd

- tapOn:
    id: "SearchScreen::FilterAccordion::Accordion::2::Item::.*"
    label: "Select first tag filter"

- waitForAnimationToEnd

- tapOn:
    id: "SearchScreen::FilterAccordion::Accordion::2"
    label: "Collapse Tags accordion"

- waitForAnimationToEnd

# Accordion index 3 is the first ingredient-type filter, always populated at
# power-user scale. Selecting its first item exercises the ingredient filter
# path without depending on a specific ingredient name.
- scrollUntilVisible:
    element:
      id: "SearchScreen::FilterAccordion::Accordion::3"
    direction: DOWN
    speed: 40
    centerElement: true
    label: "Scroll to first ingredient-type accordion"

- tapOn:
    id: "SearchScreen::FilterAccordion::Accordion::3"
    label: "Expand first ingredient-type accordion"

- extendedWaitUntil:
    visible:
      id: "SearchScreen::FilterAccordion::Accordion::3::Item::0"
    timeout: 5000
    label: "Wait for ingredient options"

- waitForAnimationToEnd

- tapOn:
    id: "SearchScreen::FilterAccordion::Accordion::3::Item::0"
    label: "Select first ingredient filter"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "SearchScreen::SearchBar"
    direction: UP
    speed: 40
    label: "Scroll to search bar"

- waitForAnimationToEnd

- tapOn:
    id: "SearchScreen::FiltersToggleButtons"
    label: "Return to filtered Search screen"

- tapOn:
    id: "SearchScreen::FiltersSelection::0::Chip"
    label: "Remove first filter chip"
    optional: true

- tapOn:
    id: "SearchScreen::FiltersSelection::0::Chip"
    label: "Remove second filter chip"
    optional: true
