appId: "com.recipedia"
---
- tapOn:
    id: "BottomTabs::Parameters"
    label: "Navigate to Parameters screen"

- tapOn:
    id: "Parameters::Section::Appearance::DarkMode::Switch"
    label: "Toggle dark mode on"

- tapOn:
    id: "Parameters::Section::Appearance::DarkMode::Switch"
    label: "Toggle dark mode off"

- tapOn:
    id: "Parameters::Section::Appearance::Language::Item"
    label: "Open language settings"

- tapOn:
    id: "LanguageSettings::Item::1"
    label: "Switch to French"

- tapOn:
    id: "BottomTabs::Parameters"
    label: "Return to Parameters screen"

- tapOn:
    id: "Parameters::Section::Appearance::Language::Item"
    label: "Open language settings again"

- tapOn:
    id: "LanguageSettings::Item::0"
    label: "Switch back to English"

- tapOn:
    id: "BottomTabs::Parameters"
    label: "Return to Parameters screen"

- tapOn:
    id: "Parameters::Section::RecipeDefaults::Persons::Item"
    label: "Open default persons settings"

- tapOn:
    id: "DefaultPersonSettings::Slider"
    point: "56%,50%"
    label: "Change slider to 6 persons"

- tapOn:
    id: "DefaultPersonSettings::Save"
    label: "Save new default persons"

- extendedWaitUntil:
    visible:
      id: "BottomTabs::Parameters"
    timeout: 360000
    label: "Wait for scaling to complete"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Tags::Item"
    direction: UP
    speed: 60
    label: "Scroll to see ingredient list"

- waitForAnimationToEnd

- tapOn:
    id: "Parameters::Section::Data::Ingredients::Item"
    label: "Open Ingredients settings"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::1::.*"
    timeout: 5000
    label: "Wait for Ingredients list"
    optional: true

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Scroll in Ingredients list"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Continue scrolling"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Scroll again"

- runFlow:
    file: "../parameters/ingredients/addNewIngredient.yaml"
    label: "Add a new ingredient"


- runFlow:
    file: "../parameters/searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "RecipeIngredient"
    label: "Search and wait for the newly added ingredient"

- tapOn:
    id: "IngredientsSettings::SearchBar-clear-icon"
    label: "Clearing the ingredient search bar"

- extendedWaitUntil:
    notVisible:
      id: "IngredientsSettings::.*::IngredientName"
      text: "RecipeIngredient"
    timeout: 10000
    label: "Wait for searched ingredient to not be displayed anymore"

- waitForAnimationToEnd

- tapOn:
    id: "IngredientsSettings::AppBar::BackButton"
    label: "Back to parameters screen"


- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Parameters::Section::Data::Tags::Item"
    direction: UP
    speed: 60
    label: "Scroll to see tag list"

- waitForAnimationToEnd

- tapOn:
    id: "Parameters::Section::Data::Tags::Item"
    label: "Open Tags settings"

- extendedWaitUntil:
    visible:
      id: "TagsSettings::1::.*"
    timeout: 5000
    label: "Wait for Tags list"
    optional: true

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Scroll in Tags list"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Continue scrolling"

- swipe:
    start: "50%,80%"
    end: "50%,20%"
    duration: 150
    label: "Scroll again"

# addNewTag already searches RecipeTag, asserts it, clears the bar and waits for
# the list to restore, so no caller-side search/clear is needed here (unlike the
# ingredient branch, where addNewIngredient does no verification).
- runFlow:
    file: "../parameters/tags/addNewTag.yaml"
    label: "Add a new tag"

- waitForAnimationToEnd

- tapOn:
    id: "TagsSettings::AppBar::BackButton"
    label: "Back to parameters screen"

