appId: "com.recipedia"
---
- evalScript: ${output.modalImageCounter = 0}

- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          file: "../adding/ocr/android/addMedia.yaml"
          env:
            RECIPE_NAME: "hellofresh"
            FIELD_NAME: "image"
          label: "Add test image to Android gallery"
      - runFlow:
          file: "../adding/ocr/android/selectMostRecentFromModal.yaml"
          label: "Select image from gallery modal (Android)"

- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          file: "../adding/ocr/iOS/selectMostRecentFromModal.yaml"
          label: "Select image from gallery modal (iOS)"

- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          file: "../adding/ocr/android/cleanupPictures.yaml"
          label: "Cleanup - Remove test image from Android gallery"
