appId: "com.recipedia"
---
- runFlow:
    file: ./android/cleanIfNeeded.yaml
    when:
      platform: Android
    label: "Clean media from Android gallery"

- runFlow:
    file: ./iOS/cleanIfNeeded.yaml
    when:
      platform: iOS
    label: "Clean media from iOS Photos"

- launchApp:
    appId: "com.recipedia"
    stopApp: false
    label: "Return to Recipedia"

- extendedWaitUntil:
    visible:
      id: "Recipe::AppBar"
    timeout: 20000
    label: "Wait for recipedia to be back"
