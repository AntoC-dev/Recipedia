appId: "com.recipedia"
---
- runFlow:
    file: ./android/cleanIfNeeded.yaml
    when:
      platform: Android
    label: "Clean all media from Android gallery"

- runFlow:
    file: ./iOS/cleanIfNeeded.yaml
    when:
      platform: iOS
    label: "Clean all media from iOS Photos"

- launchApp:
    appId: "com.recipedia"
    label: "Return to Recipedia after media cleanup"

- waitForAnimationToEnd
