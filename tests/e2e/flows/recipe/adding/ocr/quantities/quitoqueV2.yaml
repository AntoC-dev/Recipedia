appId: "com.recipedia"
---
- scrollUntilVisible:
    element:
      id: "RecipeIngredients::0::QuantityInput"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to first ingredient quantity input"

- tapOn:
    id: "RecipeIngredients::0::QuantityInput"
    label: "Tap on cacahuètes grillées quantity"

- runFlow:
    file: "../../../../waitForKeyboardNumeric.yaml"
    label: "Wait for numeric keyboard"

- inputText:
    text: "200"
    label: "Enter cacahuètes grillées quantity"

