appId: "com.recipedia"
---
- scrollUntilVisible:
    element:
      id: "RecipeIngredients::8::DeleteButton"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to ingredient to delete"


- tapOn:
    id: "RecipeIngredients::8::DeleteButton"
    label: "Delete the 'conserve' line as it is not an ingredient to keep"

- extendedWaitUntil:
    notVisible: "RecipeIngredients::11::.*"
    timeout: 5000
    label: "Wait for ingredient to be deleted"


- scrollUntilVisible:
    element:
      id: "RecipeIngredients::0::QuantityInput"
    direction: UP
    speed: 20
    centerElement: true
    label: "Scroll to first ingredient quantity input"

- tapOn:
    id: "RecipeIngredients::0::QuantityInput"
    label: "Tap on carotte quantity"

- runFlow:
    file: "../../../../waitForKeyboardNumeric.yaml"
    label: "Wait for numeric keyboard"

- inputText:
    text: "2"
    label: "Enter carotte quantity"

