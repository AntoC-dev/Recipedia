appId: "com.recipedia"
---
- launchApp:
    appId: "com.apple.mobileslideshow"
    label: "Open Photos app to delete last media"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 3000
    optional: true
    label: "Handle what's new screen if present"

- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"

- tapOn:
    point: "10%,61%"
    label: "Tap on the most recent photo"

- tapOn:
    id: "trash"
    label: "Tap trash icon"

- tapOn:
    text: "Delete Photo"
    label: "Confirm deletion"

- waitForAnimationToEnd

- stopApp:
    appId: "com.apple.mobileslideshow"
    label: "Close Photos app"

- launchApp:
    appId: "com.recipedia"
    label: "Return to Recipedia"

- waitForAnimationToEnd
