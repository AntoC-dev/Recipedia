appId: "com.recipedia"
---
- tapOn:
    text: "Recents"
    label: "Go to recents photos"

- extendedWaitUntil:
    visible:
      text: "\\d+ Photo.*"
    timeout: 3000
    label: "Wait for gallery to load"

- tapOn:
    point: "12%,18%"
    label: "Select any photos of the gallery"

- extendedWaitUntil:
    notVisible:
      id: "Recents"
    timeout: 3000
    label: "Wait for native photo picker to dismiss after selection"
