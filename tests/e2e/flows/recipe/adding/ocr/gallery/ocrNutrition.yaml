appId: "com.recipedia"
---
- evalScript: ${output.modalImageCounter = 1}

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Recipe::RecipeNutrition::NutritionEmptyState::OCRButton::RoundButton"
    direction: DOWN
    speed: 90
    centerElement: true
    label: "Scroll to nutrition section"

- waitForAnimationToEnd

- tapOn:
    id: "Recipe::RecipeNutrition::NutritionEmptyState::OCRButton::RoundButton"
    label: "Tap on OCR button for nutrition"

- runFlow:
    file: ../android/addMedia.yaml
    env:
      FIELD_NAME: nutrition
    when:
      platform: Android
- runFlow:
    file: ../iOS/addMedia.yaml
    env:
      FIELD_NAME: nutrition
    when:
      platform: iOS

- runFlow:
    file: ../android/selectMostRecentFromModal.yaml
    label: "Select nutrition from modal for OCR"
    when:
      platform: Android
- runFlow:
    file: ../iOS/selectMostRecentFromModal.yaml
    label: "Select nutrition from modal for OCR"
    when:
      platform: iOS

- extendedWaitUntil:
    visible:
      id: "Recipe::RecipeNutrition::NutritionTable"
    timeout: 120000
    label: "Wait for nutrition values to be populated by OCR"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "Recipe::RecipeNutrition::NutritionTable::EditForm::PortionWeightNumericTextInput"
    direction: DOWN
    speed: 60
    centerElement: true
    label: "Scroll to weight of a portion"

- waitForAnimationToEnd

- tapOn:
    id: "Recipe::RecipeNutrition::NutritionTable::EditForm::PortionWeightNumericTextInput"
    label: "Tap on weight input"

- runFlow:
    file: "../../../../waitForKeyboardNumeric.yaml"
    label: "Wait for numeric keyboard to appear"

- inputText:
    text: "200"
    label: "Enter the weight of a portion"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- pressKey: enter

- runFlow:
    file: "../../../../waitForKeyboardNumericDismiss.yaml"
    label: "Wait for numeric keyboard to dismiss"

- runFlow:
    file: ../cleanAndResume.yaml
    label: "Delete nutrition image from gallery and return to Recipedia"
