appId: "com.recipedia"
---
- evalScript: ${output.modalImageCounter = 1}

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "RecipeIngredients::OpenModalNames::RoundButton"
    direction: DOWN
    speed: 40
    centerElement: true
    label: "Scroll to ingredient names OCR button"

- waitForAnimationToEnd

- tapOn:
    id: "RecipeIngredients::OpenModalNames::RoundButton"
    label: "Tap on ingredient names OCR button"

- runFlow:
    file: ../android/addMedia.yaml
    env:
      FIELD_NAME: ingredientNames
    when:
      platform: Android
- runFlow:
    file: ../iOS/addMedia.yaml
    env:
      FIELD_NAME: ingredientNames
    when:
      platform: iOS

- runFlow:
    file: ../android/selectMostRecentFromModal.yaml
    label: "Select ingredient names image from modal"
    when:
      platform: Android
- runFlow:
    file: ../iOS/selectMostRecentFromModal.yaml
    label: "Select ingredient names image from modal"
    when:
      platform: iOS

- extendedWaitUntil:
    visible:
      id: "RecipeValidation::ValidationQueue::Ingredient::SimilarityDialog::Title"
    timeout: 120000
    label: "Wait for validation queue for ingredient names"

- runFlow:
    file: "../../../validation/validateAllIngredients.yaml"
    env:
      PREFIX: "RecipeValidation"
    label: "Validate all ingredients from names OCR"

- extendedWaitUntil:
    visible:
      id: "RecipeIngredients::0::NameInput::CustomTextInput"
    timeout: 120000
    label: "Wait for first ingredient name to be populated"

- assertVisible:
    id: "RecipeIngredients::OpenModalQuantities::RoundButton::Label"
    text: "Scan quantities"
    label: "Scan quantities button label is rendered"

- runFlow:
    file: ../android/deleteLastMedia.yaml
    when:
      platform: Android
    label: "Delete ingredient names image from Android gallery"

- runFlow:
    file: ../iOS/deleteLastMedia.yaml
    when:
      platform: iOS
    label: "Delete ingredient names image from iOS Photos"

- evalScript: ${output.modalImageCounter = 1}

- scrollUntilVisible:
    element:
      id: "RecipeIngredients::OpenModalQuantities::RoundButton"
    direction: DOWN
    speed: 40
    centerElement: true
    label: "Scroll to ingredient quantities OCR button"

- waitForAnimationToEnd

- tapOn:
    id: "RecipeIngredients::OpenModalQuantities::RoundButton"
    label: "Tap on ingredient quantities OCR button"

- runFlow:
    file: ../android/addMedia.yaml
    env:
      FIELD_NAME: ingredientQuantities
    when:
      platform: Android
- runFlow:
    file: ../iOS/addMedia.yaml
    env:
      FIELD_NAME: ingredientQuantities
    when:
      platform: iOS

- runFlow:
    file: ../android/selectMostRecentFromModal.yaml
    label: "Select ingredient quantities image from modal"
    when:
      platform: Android
- runFlow:
    file: ../iOS/selectMostRecentFromModal.yaml
    label: "Select ingredient quantities image from modal"
    when:
      platform: iOS

- extendedWaitUntil:
    visible:
      id: "RecipeIngredients::0::QuantityInput::CustomTextInput"
    timeout: 120000
    label: "Wait for first ingredient quantity to be populated"

- runFlow:
    file: ../android/deleteLastMedia.yaml
    when:
      platform: Android
    label: "Delete ingredient quantities image from Android gallery"

- runFlow:
    file: ../iOS/deleteLastMedia.yaml
    when:
      platform: iOS
    label: "Delete ingredient quantities image from iOS Photos"
