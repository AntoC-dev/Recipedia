appId: "com.recipedia"
---
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "RecipeIngredients::PrefixText"
    direction: UP
    speed: 40
    centerElement: true
    label: "Scroll to ingredient section"

- scrollUntilVisible:
    element:
      id: "RecipeIngredients::OpenModalNames::RoundButton"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Scroll to ingredient names OCR button"

- waitForAnimationToEnd

- tapOn:
    id: "RecipeIngredients::OpenModalNames::RoundButton"
    label: "Tap on ingredient names OCR button"

- runFlow:
    file: ../android/addMedia.yaml
    env:
      FIELD_NAME: ingredientNames
    when:
      platform: Android
- runFlow:
    file: ../iOS/addMedia.yaml
    env:
      FIELD_NAME: ingredientNames
    when:
      platform: iOS

- runFlow:
    file: ../android/selectMostRecentFromModal.yaml
    label: "Select ingredient names image from modal"
    when:
      platform: Android
- runFlow:
    file: ../iOS/selectMostRecentFromModal.yaml
    label: "Select ingredient names image from modal"
    when:
      platform: iOS

- extendedWaitUntil:
    visible:
      id: "RecipeValidation::ValidationQueue::Ingredient::SimilarityDialog::Title"
    timeout: 120000
    label: "Wait for validation queue for ingredient names"

- runFlow:
    file: "../../../validation/validateAllIngredients.yaml"
    env:
      PREFIX: "RecipeValidation"
    label: "Validate all ingredients from names OCR"

- extendedWaitUntil:
    visible:
      id: "RecipeIngredients::0::NameInput::CustomTextInput"
    timeout: 120000
    label: "Wait for first ingredient name to be populated"

- runFlow:
    file: ../cleanAndResume.yaml
    label: "Delete ingredient names image from gallery and return to Recipedia"

- runFlow:
    when:
      true: ${output.isQuantitiesOCR == true}
    commands:
      - scrollUntilVisible:
          element:
            id: "RecipeIngredients::OpenModalQuantities::RoundButton"
          direction: DOWN
          speed: 40
          centerElement: true
          label: "Scroll to ingredient quantities OCR button"

      - waitForAnimationToEnd

      - tapOn:
          id: "RecipeIngredients::OpenModalQuantities::RoundButton"
          label: "Tap on ingredient quantities OCR button"

      - runFlow:
          file: ../android/addMedia.yaml
          env:
            FIELD_NAME: ingredientQuantities
          when:
            platform: Android
      - runFlow:
          file: ../iOS/addMedia.yaml
          env:
            FIELD_NAME: ingredientQuantities
          when:
            platform: iOS

      - runFlow:
          file: ../android/selectMostRecentFromModal.yaml
          label: "Select ingredient quantities image from modal"
          when:
            platform: Android
      - runFlow:
          file: ../iOS/selectMostRecentFromModal.yaml
          label: "Select ingredient quantities image from modal"
          when:
            platform: iOS

      - extendedWaitUntil:
          visible:
            id: "RecipeIngredients::.*::QuantityInput"
            text: ".*"
          timeout: 120000
          label: "Wait for last ingredient quantity to be populated"

      - runFlow:
          file: ../cleanAndResume.yaml
          label: "Delete ingredient quantities image from gallery and return to Recipedia"

- extendedWaitUntil:
    visible:
      id: "RecipeIngredients::.*::QuantityInput"
      text: ""
    timeout: 120000
    label: "Wait for last ingredient quantity to be populated"

- runFlow:
    when:
      true: ${output.isQuantitiesOCR == false}
    commands:
      - runFlow:
          file: "../quantities/quitoqueV1.yaml"
          label: "Manually fill quitoqueV1 ingredient quantities (Android: ML Kit qty extraction unreliable; iOS uses OCR path)"
          when:
            true: ${RECIPE_NAME == "quitoqueV1"}
      - runFlow:
          file: "../quantities/quitoqueV2.yaml"
          label: "Manually fill quitoqueV2 ingredient quantities (Android: ML Kit qty extraction unreliable; iOS uses OCR path)"
          when:
            true: ${RECIPE_NAME == "quitoqueV2"}
      - runFlow:
          file: "../quantities/quitoqueV3.yaml"
          label: "Manually fill quitoqueV3 ingredient quantities (OCR yields fewer qty than names for this recipe — exercises manual-edit path)"
          when:
            true: ${RECIPE_NAME == "quitoqueV3"}
