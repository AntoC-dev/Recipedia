appId: "com.recipedia"
---
- evalScript: ${output.modalImageCounter = 1}

- tapOn:
    id: "RecipeTitle::OpenModal::RoundButton"
    label: "Tap on OCR button of recipe title"

- runFlow:
    file: ../android/addMedia.yaml
    env:
      FIELD_NAME: title
    when:
      platform: Android
- runFlow:
    file: ../iOS/addMedia.yaml
    env:
      FIELD_NAME: title
    when:
      platform: iOS

- runFlow:
    file: ../android/selectMostRecentFromModal.yaml
    label: "Select title from modal for OCR"
    when:
      platform: Android
- runFlow:
    file: ../iOS/selectMostRecentFromModal.yaml
    label: "Select title from modal for OCR"
    when:
      platform: iOS

- extendedWaitUntil:
    visible:
      id: "RecipeTitle::CustomTextInput"
    timeout: 60000
    label: "Wait for title to be populated by OCR"

- runFlow:
    file: ../android/deleteLastMedia.yaml
    when:
      platform: Android
    label: "Delete title image from Android gallery"

- runFlow:
    file: ../iOS/deleteLastMedia.yaml
    when:
      platform: iOS
    label: "Delete title image from iOS Photos"
