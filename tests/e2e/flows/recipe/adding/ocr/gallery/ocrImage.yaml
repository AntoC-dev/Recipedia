appId: "com.recipedia"
---
- runFlow:
    file: ../android/addMedia.yaml
    env:
      FIELD_NAME: image
    when:
      platform: Android
- runFlow:
    file: ../iOS/addMedia.yaml
    env:
      FIELD_NAME: image
    when:
      platform: iOS

- runFlow:
    file: "../../../../fab/expand.yaml"
    label: "Setup - Expand FAB menu"

# FAB ID uses regex pattern because React Native Paper adds suffix on iOS
- tapOn:
    id: "GalleryButton.*"
    label: "Open gallery for OCR"

- runFlow:
    file: ../android/selectFromGallery.yaml
    when:
      platform: Android
- runFlow:
    file: ../iOS/selectFromGallery.yaml
    when:
      platform: iOS

- tapOn:
    id: "RecipeImage::RoundButton"
    label: "Tap on OCR button of recipe image"

- tapOn:
    id: "Modal::List#0::SquareButton::Image"
    label: "Select first image from app modal"

- runFlow:
    file: ../android/validateWithoutCropping.yaml
    when:
      platform: Android
- runFlow:
    file: ../iOS/validateWithoutCropping.yaml
    when:
      platform: iOS

- runFlow:
    file: ../android/deleteLastMedia.yaml
    when:
      platform: Android
    label: "Delete recipe image from Android gallery"

- runFlow:
    file: ../iOS/deleteLastMedia.yaml
    when:
      platform: iOS
    label: "Delete recipe image from iOS Photos"
