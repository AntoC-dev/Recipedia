appId: "com.recipedia"
---
- launchApp:
    appId: "com.google.android.documentsui"
    label: "Open Files app to delete last media"

- tapOn:
    id: "android:id/icon"
    label: "Show roots menu"

- tapOn:
    text: "Images"
    index: 1
    label: "Navigate to Images category"

- runFlow:
    when:
      visible:
        text: "Pictures"
    commands:
      - tapOn:
          text: "Pictures"
          label: "Open Pictures folder"
      - longPressOn:
          index: 0
          id: "com.android.documentsui:id/icon_thumb"
          label: "Long-press to select most recent image"
      - tapOn:
          id: "com.android.documentsui:id/action_menu_delete"
          label: "Tap delete"
      - tapOn:
          text: "OK"
          label: "Confirm deletion"

- stopApp:
    appId: "com.google.android.documentsui"
    label: "Close Files app"

- launchApp:
    appId: "com.recipedia"
    label: "Return to Recipedia"

- waitForAnimationToEnd
