appId: "com.recipedia"
---
# Adds media file to device gallery
# MediaStore indexing is verified by waitAndVerifyGalleryReady.yaml with retry logic
# Uses conditionals to select hardcoded path since addMedia doesn't support variables

# HelloFresh recipe paths
- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "image"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/image.jpg"

- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "title"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/title.jpg"

- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "description"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/description.jpg"

- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "tags"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/tags.jpg"

- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "ingredientNames"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/ingredients_names.jpeg"

- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "ingredientQuantities"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/ingredients_quantities.jpeg"

- runFlow:
    when:
      true: ${RECIPE_NAME == "hellofresh" && FIELD_NAME == "preparation"}
    commands:
      - addMedia:
          - "../../../../../../assets/aiguillettesTeriyaki/preparation.jpg"

