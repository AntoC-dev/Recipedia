appId: "com.recipedia"
---
- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "0"
      VALUE: "1"
    label: "Fill Oignon quantity: 1"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "1"
      VALUE: "100"
    label: "Fill Cheddar quantity: 100"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "2"
      VALUE: "4"
    label: "Fill Pain pour hamburger quantity: 4"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "3"
      VALUE: "400"
    label: "Fill Viande hachée quantity: 400"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "4"
      VALUE: "1"
    label: "Fill Tomate quantity: 1"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "5"
      VALUE: "50"
    label: "Fill Salade quantity: 50"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "6"
      VALUE: "30"
    label: "Fill Moutarde quantity: 30"

- runFlow:
    file: "../enterIngredientQuantity.yaml"
    env:
      INDEX: "7"
      VALUE: "30"
    label: "Fill Ketchup quantity: 30"

- scrollUntilVisible:
    element:
      id: "RecipeImage"
    direction: UP
    speed: 85
    timeout: 120000
    label: "Scroll back to top"

- waitForAnimationToEnd
