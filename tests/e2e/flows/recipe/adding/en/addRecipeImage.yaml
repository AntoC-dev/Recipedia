appId: "com.recipedia"
---
- runFlow:
    file: "../../shared/openImageModalAndPick.yaml"
    label: "Open modal and pick a photo"

- assertVisible:
    id: "Modal::List#0::SquareButton::Image"
    label: "Check that the most recent photo is displayed in the modal"

- tapOn:
    id: "Modal::List#0::SquareButton::Image"
    label: "Select camera picture"

- runFlow:
    file: "../ocr/android/validateWithoutCropping.yaml"
    when:
      platform: Android
    label: "Validate without cropping on Android"
- runFlow:
    file: "../ocr/iOS/validateWithoutCropping.yaml"
    when:
      platform: iOS
    label: "Validate without cropping on iOS"
