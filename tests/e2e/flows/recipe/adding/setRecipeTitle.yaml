appId: "com.recipedia"
---

- scrollUntilVisible:
    element:
      id: "RecipeTitle::CustomTextInput"
    direction: DOWN
    speed: 10
    centerElement: true
    label: "Center title input before focus"

- tapOn:
    id: "RecipeTitle::CustomTextInput"
    label: "Focus on recipe title input"

- runFlow:
    when:
      visible:
        id: "RecipeTitle::CustomTextInput"
        text: ".*"
    commands:
      - eraseText:
          label: "Erase the existing title"
      - waitForAnimationToEnd:
          label: "Wait for keyboard animation"
      - assertVisible:
          id: "RecipeTitle::CustomTextInput"
          text: ""
          label: "Check that the title is empty"

- inputText:
    text: "${TITLE}"
    label: "Enter recipe title"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- tapOn:
    id: "RecipeTitle::Text"
    label: "Tap title label to blur title and close the keyboard"

- assertVisible:
    id: "RecipeTitle::CustomTextInput"
    text: "${TITLE}"

- runFlow:
    file: "../../waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to disappear"
