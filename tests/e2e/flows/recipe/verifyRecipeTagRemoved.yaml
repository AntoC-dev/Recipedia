appId: "com.recipedia"
---
- tapOn:
    id: "BottomTabs::Search"
    label: "Navigate to Search screen"

- extendedWaitUntil:
    visible:
      id: "SearchScreen::RecipeCards::.*::Cover"
    timeout: 30000
    label: "Wait for recipe card to be displayed"

- tapOn:
    id: "SearchScreen::RecipeCards::.*::Cover"
    label: "Open the E2E Test Recipe"

- extendedWaitUntil:
    visible:
      id: "Recipe::AppBar"
    timeout: 30000
    optional: true
    label: "Wait for recipe screen to be displayed"

- assertVisible:
    id: "RecipeTitle::Text"
    text: "E2E Test Recipe"
    label: "Assert - Verify recipe name is the test recipe"

- assertNotVisible:
    text: "RecipeTag"
    label: "Verify RecipeTag has been removed from the recipe"
