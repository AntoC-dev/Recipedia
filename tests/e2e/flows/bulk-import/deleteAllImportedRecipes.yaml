appId: "com.recipedia"
---
- tapOn:
    id: "BottomTabs::Search"
    label: "Navigate to Search screen"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "SearchScreen::RecipeCards::(1[1-9]|[2-9]\\d|\\d{3,})::Cover"
    direction: DOWN
    speed: 60
    centerElement: true
    optional: true
    label: "Scroll to first imported recipe if it exists"

- waitForAnimationToEnd

# Delete all imported recipes (ID >= 11) until none remain (up to 10 times)
- repeat:
    times: 10
    commands:
      - runFlow:
          when:
            visible:
              id: "SearchScreen::RecipeCards::(1[1-9]|[2-9]\\d|\\d{3,})::Cover"
          commands:
            - tapOn:
                id: "SearchScreen::RecipeCards::(1[1-9]|[2-9]\\d|\\d{3,})::Cover"
            - tapOn:
                id: "Recipe::AppBar::Delete"
            - extendedWaitUntil:
                visible:
                  id: "Recipe::Dialog::Cancel"
                timeout: 5000
            - tapOn:
                id: "Recipe::Dialog::Confirm"
            - extendedWaitUntil:
                notVisible:
                  id: "Recipe::Dialog::Cancel"
                timeout: 5000
            - tapOn:
                id: "Recipe::Dialog::Confirm"
            - waitForAnimationToEnd
    label: "Delete imported recipes"

- scrollUntilVisible:
    element:
      id: "SearchScreen::SearchBar"
    direction: UP
    speed: 90
    timeout: 60000
    label: "Scroll to first imported recipe if it exists"
