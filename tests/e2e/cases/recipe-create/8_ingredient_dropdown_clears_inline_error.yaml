name: '8 - Recipe Create Ingredient Dropdown Clears Inline Error Flow'
appId: 'com.recipedia'
tags:
  - recipe-create
---
- runFlow:
    file: '../../flows/recipe/adding/manual/en/openAddManually.yaml'
    label: 'Action - Open manual recipe adding screen'

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'RecipeIngredients::AddButton::RoundButton'
    direction: DOWN
    speed: 20
    timeout: 60000
    centerElement: true
    label: 'Action - Scroll to ingredients section'

- waitForAnimationToEnd

- tapOn:
    id: 'RecipeIngredients::AddButton::RoundButton'
    label: 'Action - Add empty ingredient row'

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'RecipeIngredients::0::QuantityInput'
    direction: UP
    speed: 20
    centerElement: true
    label: 'Action - Scroll to ingredient input'

- tapOn:
    id: 'RecipeIngredients::0::QuantityInput'
    label: 'Action - Focus the quantity input'

- inputText:
    text: '100'
    label: 'Action - Type a quantity to dirty the row (no name yet)'

- waitForAnimationToEnd

- pressKey: enter

- runFlow:
    file: '../../flows/waitForKeyboardNumericDismiss.yaml'
    label: 'Wait for numeric keyboard to dismiss'

- runFlow:
    file: '../../asserts/recipe/inlineErrors/en/ingredientRowError.yaml'
    label: 'Assert - Row inline error visible because the row is dirty but the name is still empty'

- tapOn:
    id: 'RecipeIngredients::0::NameInput::CustomTextInput'
    label: 'Action - Focus the ingredient name input'

- runFlow:
    file: '../../flows/waitForKeyboard.yaml'
    label: 'Wait for keyboard'

- inputText:
    text: 'Car'
    label: 'Action - Type a partial name to expose the autocomplete dropdown'

- waitForAnimationToEnd

- tapOn:
    id: 'RecipeIngredients::0::NameInput::AutocompleteItem::Carrots'
    label: 'Action - Select an existing DB ingredient from the dropdown'

- waitForAnimationToEnd

- runFlow:
    file: '../../flows/waitForKeyboardDismiss.yaml'
    label: 'Wait for keyboard to dismiss'

- runFlow:
    file: '../../asserts/recipe/inlineErrors/en/ingredientRowNoError.yaml'
    label: 'Assert - Row inline error cleared after the dropdown selection populated DB metadata (type/season/id)'
