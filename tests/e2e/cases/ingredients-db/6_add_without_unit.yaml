name: "6 - Add Ingredient Without Unit"
appId: "com.recipedia"
tags:
  - database
  - ingredients-db
---
- runFlow:
    file: "../../flows/parameters/ingredients/navigateToIngredientsSettings.yaml"
    label: "Action - Navigate to Ingredients Settings"

- tapOn:
    id: "IngredientsSettings::BottomActionButton"
    label: "Action - Open add ingredient dialog"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    label: "Action - Focus on ingredient name input"

- eraseText:
    label: "Action - Clear existing ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- inputText:
    text: "UnitlessIngredient"
    label: "Action - Enter new ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../flows/waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    label: "Action - Expand type accordion"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.*"
    timeout: 5000
    label: "Wait for type accordion to be expanded"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.cereal"
    label: "Action - Select cereal type"

- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "radio button, checked"
          timeout: 30000
          label: "Wait for item to be checked on iOS"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    label: "Action - Collapse type accordion"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::ConfirmButton"
    label: "Action - Confirm adding ingredient without unit"

- waitForAnimationToEnd

- runFlow:
    file: "../../flows/parameters/searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "UnitlessIngredient"
    label: "Action - Search for new ingredient"
