name: "1 - Add New Ingredient Flow"
appId: "com.recipedia"
tags:
  - database
  - ingredients-db
---
- runFlow:
    file: "../../flows/setupFirstTest.yaml"
    label: "Setup - Launch app and wait for ready"

- runFlow:
    file: "../../flows/parameters/ingredients/navigateToIngredientsSettings.yaml"
    label: "Action - Navigate to Ingredients Settings"

- runFlow:
    file: "../../asserts/parameters/ingredients/en/assertIngredientsSettingsScreen.yaml"
    label: "Assert - Verify Ingredients Settings screen displays correctly"

- tapOn:
    id: "IngredientsSettings::BottomActionButton"
    label: "Action - Open add ingredient dialog"

- runFlow:
    file: "../../asserts/parameters/ingredients/en/assertAddModalOpen.yaml"
    label: "Assert - Verify Add ingredient modal displayed"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    label: "Action - Focus on ingredient name input"

- runFlow:
    file: "../../flows/waitForKeyboard.yaml"
    label: "Wait for keyboard to appear"

- inputText:
    text: "TestIngredient"
    label: "Action - Enter new ingredient name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../flows/waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    text: "TestIngredient"
    label: "Assert - Verify new ingredient name displayed in input"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    label: "Action - Expand type accordion"

- scrollUntilVisible:
    element:
      id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.vegetable"
    speed: 20
    timeout: 120000
    direction: DOWN
    label: "Action - Scroll to Vegetable item"

- waitForAnimationToEnd:
    label: "Wait for scroll animation to end"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.vegetable"
    label: "Action - Select vegetable type"

- scrollUntilVisible:
    element:
      id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    speed: 20
    timeout: 120000
    direction: UP
    centerElement: true
    label: "Action - Scroll up to ensure type accordion is visible"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    label: "Action - Collapse type accordion"

- extendedWaitUntil:
    notVisible:
      id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.*"
    timeout: 30000
    label: "Wait for type accordion to collapse"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Unit::CustomTextInput"
    label: "Action - Focus on unit input"

- inputText:
    text: "g"
    label: "Action - Enter unit"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../flows/waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::SeasonalityCalendar"
    label: "Action - Expand seasonality accordion"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::ItemDialog::AddModal::SeasonalityCalendar::.*"
    timeout: 5000
    label: "Wait for seasonality accordion to expand"

- scrollUntilVisible:
    element:
      id: "IngredientsSettings::ItemDialog::AddModal::SeasonalityCalendar::12"
    direction: DOWN
    speed: 20
    centerElement: true
    label: "Action - Scroll to december item"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::SeasonalityCalendar::12"
    label: "Action - Add december to seasonality"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::ConfirmButton"
    label: "Action - Confirm adding new ingredient"

- waitForAnimationToEnd

- runFlow:
    file: "../../flows/parameters/searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "TestIngredient"
    label: "Action - Search for new ingredient"

- assertVisible:
    id: "IngredientsSettings::0::IngredientName"
    text: "TestIngredient"
    label: "Assert - Verify new ingredient displayed in list"

- runFlow:
    file: "../../flows/parameters/ingredients/returnToHome.yaml"
    label: "Cleanup - Return to Home screen"
