name: "1 - Add New Ingredient Flow"
appId: "com.recipedia"
tags:
  - database
  - ingredients-db
---
- runFlow:
    file: "../../flows/parameters/ingredients/navigateToIngredientsSettings.yaml"
    label: "Action - Navigate to Ingredients Settings"

- runFlow:
    file: "../../asserts/parameters/ingredients/en/assertIngredientsSettingsScreen.yaml"
    label: "Assert - Verify Ingredients Settings screen displays correctly"

- runFlow:
    file: "../../flows/parameters/ingredients/createTestIngredient.yaml"
    label: "Action - Create TestIngredient"

- runFlow:
    file: "../../flows/parameters/searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "IngredientsSettings"
      SEARCH_QUERY: "TestIngredient"
    label: "Action - Search for new ingredient"

- assertVisible:
    id: "IngredientsSettings::36::IngredientName"
    text: "TestIngredient"
    label: "Assert - Verify new ingredient displayed in list"
