name: "2 - Edit Existing Tag Flow"
appId: "com.recipedia"
tags:
  - database
  - tags-db
---
- runFlow:
    file: "../../flows/setupTest.yaml"
    label: "Setup - Launch app and wait for ready"

- runFlow:
    file: "../../flows/parameters/tags/navigateToTagsSettings.yaml"
    label: "Action - Navigate to Tags Settings"

- waitForAnimationToEnd

- runFlow:
    file: "../../flows/parameters/searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "TagsSettings"
      SEARCH_QUERY: "Italian"
    label: "Action - Search for Italian tag"

- assertVisible:
    id: "TagsSettings::0::TagName"
    text: "Italian"
    label: "Assert - Verify Italian tag exists"

- tapOn:
    id: "TagsSettings::0::EditButton"
    label: "Action - Open edit dialog for Italian tag"

- extendedWaitUntil:
    visible:
      id: "TagsSettings::ItemDialog::EditModal::Title"
    timeout: 3000
    label: "Wait for element tag edit dialog to be displayed"

- runFlow:
    file: "../../asserts/parameters/tags/en/assertEditModalOpen.yaml"
    label: "Assert - Verify Edit tag modal displayed"

- tapOn:
    id: "TagsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    point: "95%,50%"
    label: "Action - Focus on tag name input"

- runFlow:
    file: "../../flows/waitForKeyboard.yaml"
    label: "Wait for keyboard to appear"

- inputText:
    text: " Cuisine"
    label: "Action - Append Cuisine to tag name"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- assertVisible:
    id: "TagsSettings::ItemDialog::EditModal::Name::CustomTextInput"
    text: "Italian Cuisine"
    label: "Assert - Verify tag name updated to Italian Cuisine"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../flows/waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "TagsSettings::ItemDialog::EditModal::ConfirmButton"
    label: "Action - Save edited tag"

- assertNotVisible:
    id: "TagsSettings::0::TagName"
    text: "Italian"
    label: "Assert - Verify old tag name no longer exists"

- assertVisible:
    id: "TagsSettings::0::TagName"
    text: "Italian Cuisine"
    label: "Assert - Verify tag renamed to Italian Cuisine"

- runFlow:
    file: "../../flows/parameters/tags/returnToHome.yaml"
    label: "Action - Return to Home screen"

- runFlow:
    file: "../../flows/parameters/tags/verifyTagRenameInSearch.yaml"
    label: "Verification - Verify tag renamed in Search and recipes"

- runFlow:
    file: "../../flows/parameters/tags/restoreTagName.yaml"
    label: "Cleanup - Restore tag name to Italian"

- runFlow:
    file: "../../flows/parameters/tags/returnToHome.yaml"
    label: "Cleanup - Return to Home screen"
