name: "1 - Add New Tag Flow"
appId: "com.recipedia"
tags:
  - database
  - tags-db
---
- runFlow:
    file: "../../flows/parameters/tags/navigateToTagsSettings.yaml"
    label: "Action - Navigate to Tags Settings"

- runFlow:
    file: "../../asserts/parameters/tags/en/assertTagsSettingsScreen.yaml"
    label: "Assert - Verify Tags Settings screen displays correctly"

- runFlow:
    file: "../../flows/parameters/tags/createTestTag.yaml"
    label: "Action - Create TestTag"

- runFlow:
    file: "../../flows/parameters/searchInSettingsList.yaml"
    env:
      SETTINGS_SCREEN: "TagsSettings"
      SEARCH_QUERY: "TestTag"
    label: "Action - Search for new tag"

- assertVisible:
    id: "TagsSettings::0::TagName"
    text: "TestTag"
    label: "Assert - Verify new tag displayed in list"
