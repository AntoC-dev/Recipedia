name: "6 - Ingredient Parenthetical Matching Flow"
appId: "com.recipedia"
tags:
  - duplicates
---
- runFlow:
    file: "../../flows/parameters/ingredients/navigateToIngredientsSettings.yaml"
    label: "Action - Navigate to Ingredients Settings"

- tapOn:
    id: "IngredientsSettings::BottomActionButton"
    label: "Action - Open add ingredient dialog"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    label: "Action - Expand type accordion"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.condiment"
    timeout: 5000
    label: "Wait for type accordion to be expanded"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion::ingredientTypes.condiment"
    label: "Action - Select Condiment type"

- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "radio button, checked"
          timeout: 30000
          label: "Wait for item to be checked on iOS"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::TypeAccordion"
    label: "Action - Collapse type accordion"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Unit::CustomTextInput"
    label: "Action - Focus on unit input"

- inputText:
    text: "can"
    label: "Action - Enter unit"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../flows/waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- tapOn:
    id: "IngredientsSettings::ItemDialog::AddModal::Name::CustomTextInput"
    label: "Action - Focus on ingredient name input"

- inputText:
    text: "Tomatoes (canned)"
    label: "Action - Enter ingredient with parenthetical"

- waitForAnimationToEnd:
    label: "Wait for keyboard animation"

- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard:
          label: "Dismiss keyboard on Android"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "Done"
          label: "Tap Done key to dismiss keyboard on iOS"

- runFlow:
    file: "../../flows/waitForKeyboardDismiss.yaml"
    label: "Wait for keyboard to dismiss"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::ItemDialog::AddModal::ConfirmButton"
    timeout: 500
    label: "Wait - Debounce validation"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::HelperText"
    text: "This ingredient name already exists"
    label: "Assert - Helper text visible for exact duplicate"

- extendedWaitUntil:
    visible:
      id: "IngredientsSettings::ItemDialog::AddModal::HelperText"
    timeout: 1000
    label: "Wait - Helper text appears after debounce"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::HelperText"
    text: "This ingredient name already exists"
    label: "Assert - Helper text visible for similar match"

- assertVisible:
    id: "IngredientsSettings::ItemDialog::AddModal::ConfirmButton"
    enabled: false
    label: "Assert - Confirm button disabled (missing type and unit)"
