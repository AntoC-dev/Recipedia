name: "5 - Recipe Edit Image Persistence Flow"
appId: "com.recipedia"
tags:
  - recipe-edit
---
- runFlow:
    file: "../../flows/search/searchAndOpenRecipe.yaml"
    env:
      RECIPE_NAME: "Caesar"
    label: "Action - Search and open Caesar salad"

- assertVisible:
    id: "RecipeImage::Image"
    label: "Assert - Recipe has an image before editing"

- tapOn:
    id: "Recipe::AppBar::Edit"
    waitToSettleTimeoutMs: 0
    retryTapIfNoChange: false
    label: "Action - Enter edit mode"

- extendedWaitUntil:
    visible:
      id: "RecipeImage::RoundButton"
    timeout: 5000
    label: "Wait for recipe image button to be displayed"

- runFlow:
    file: "../../flows/recipe/shared/openImageModalAndPick.yaml"
    label: "Action - Select a new photo as recipe image"

- tapOn:
    id: "Recipe::AppBar::Validate"
    label: "Action - Save changes"

- waitForAnimationToEnd

- tapOn:
    id: "Recipe::AppBar::BackButton"
    label: "Action - Back to Search screen"

- tapOn:
    id: "SearchScreen::FiltersSelection::0::Chip"
    label: "Action - Remove search filter"

- runFlow:
    file: "../../flows/search/searchAndOpenRecipe.yaml"
    env:
      RECIPE_NAME: "Caesar"
    label: "Action - Re-open recipe to verify image persistence"

- assertVisible:
    id: "RecipeImage::Image"
    label: "Assert - Image persisted after editing recipe"
