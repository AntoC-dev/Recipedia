name: "2 - OCR Quitoque V1 Gallery Flow"
appId: "com.recipedia"
tags:
  - ocr
---
- evalScript: ${output.isDescriptionToOCR = false}
- evalScript: ${output.isTagsToOCR = false}
- evalScript: ${output.isTime = true}
- evalScript: ${output.isNutritionToOCR = false}

- runFlow:
    file: "../../flows/recipe/adding/ocr/gallery/addRecipeFromGallery.yaml"
    env:
      RECIPE_NAME: quitoqueV1
    label: "Action - Add recipe from gallery using OCR"

- runFlow:
    file: "../../asserts/alerts/en/recipeAddedToDatabase.yaml"
    env:
      RECIPE_NAME: "TAJINE DE MERGUEZ AU CUMIN"
    label: "Assert - Verify recipe added successfully"

- runFlow:
    file: "../../flows/search/searchAndOpenRecipe.yaml"
    env:
      RECIPE_NAME: "MERGUEZ"
    label: "Verification - Search and open newly created recipe"

- runFlow:
    file: "../../asserts/recipe/readonly/en/tajineMerguez.yaml"
    label: "Assert - Verify recipe content in read-only mode"
