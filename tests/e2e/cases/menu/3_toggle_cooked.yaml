name: "3 - Toggle Cooked Status Flow"
appId: "com.recipedia"
tags:
  - menu
---
- runFlow:
    file: "../../flows/menu/addRecipeToMenu.yaml"
    label: "Setup - Add Classic Pancakes to menu"

- tapOn:
    id: "BottomTabs::Menu"
    label: "Action - Navigate to Menu screen"

- extendedWaitUntil:
    visible:
      id: "MenuScreen::.*"
    timeout: 30000
    label: "Wait for Menu screen to be visible"

- tapOn:
    id: "MenuScreen::MenuItem::1::Checkbox"
    retryTapIfNoChange: true
    label: "Action - Mark recipe as cooked"

- extendedWaitUntil:
    visible:
      id: "MenuScreen::SectionHeader::Cooked"
    timeout: 5000
    label: "Wait for recipe to became cooked"

- assertVisible:
    id: "MenuScreen::SectionHeader::Cooked"
    text: "Cooked"
    label: "Assert - Verify 'Cooked' section now visible"

- assertNotVisible:
    id: "MenuScreen::SectionHeader::ToCook"
    label: "Assert - Verify 'To Cook' section no longer visible"

- tapOn:
    id: "MenuScreen::MenuItem::1::Checkbox"
    label: "Action - Mark recipe as uncooked again"

- assertVisible:
    id: "MenuScreen::SectionHeader::ToCook"
    text: "To Cook"
    label: "Assert - Verify 'To Cook' section visible again"

- assertNotVisible:
    id: "MenuScreen::SectionHeader::Cooked"
    label: "Assert - Verify 'Cooked' section no longer visible"
