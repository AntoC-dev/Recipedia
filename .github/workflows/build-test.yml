name: Build & Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  actions: read

jobs:
  install-and-doctor:
    name: Install Dependencies and run Expo doctor
    runs-on: ubuntu-latest
    # Trusted context that receives secrets: push or same-repo PR. Fork PRs don't.
    outputs:
      is_internal: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Cache node modules
        uses: actions/cache/save@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

  bundle-size:
    name: JS Bundle Size
    runs-on: ubuntu-latest
    needs: install-and-doctor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore node modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Export production JS bundle
        run: npx expo export --platform android --output-dir dist-bundle
        env:
          EXPO_PUBLIC_DATASET_TYPE: production

      - name: Check bundle size against budget
        run: node .github/scripts/check-bundle-size.mjs dist-bundle

  reassure-performance:
    name: Reassure Performance Tests
    runs-on: ubuntu-latest
    needs: install-and-doctor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # No node_modules cache restore here: the steps below checkout the base then
      # head SHA and `npm ci` for each (deps must match each ref's lockfile), which
      # would overwrite any restored modules. Instead cache the npm download cache
      # (~/.npm) so both installs are fast without re-fetching from the registry.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run Reassure performance tests
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          npm ci --prefer-offline --no-audit --no-fund
          npm run test:perf:baseline
          git checkout ${{ github.sha }}
          npm ci --prefer-offline --no-audit --no-fund
          npm run test:perf

      - name: Generate compact Reassure summary
        if: github.event_name == 'pull_request'
        run: node .github/scripts/reassure-compact-summary.mjs

      - name: Post Reassure results on PR
        if: github.event_name == 'pull_request' && needs.install-and-doctor.outputs.is_internal == 'true' && hashFiles('.reassure/output-compact.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: reassure
          path: .reassure/output-compact.md

      - name: Upload Reassure output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reassure-output
          path: .reassure/
          retention-days: 7
          if-no-files-found: warn

      # Hard gate: blocks merge on a significant render regression. Runs AFTER the
      # PR comment + artifact upload so reviewers still get the full diagnosis.
      - name: Gate on Reassure regressions
        if: github.event_name == 'pull_request'
        run: node .github/scripts/check-reassure-regression.mjs

  unit-tests-and-coverage:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: install-and-doctor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore node modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run tests with coverage
        run: npm run test:unit:coverage

      - name: Unit tests summary
        uses: test-summary/action@v2
        with:
          paths: junit.xml
          output: unit-test-summary.md
        if: always()

      - name: Upload unit tests summary
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-summary
          path: unit-test-summary.md
        if: always()

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

      - name: Coverage report for changed files
        uses: 5monkeys/cobertura-action@master
        with:
          path: coverage/cobertura-coverage.xml
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          minimum_coverage: 75
          fail_below_threshold: false
          show_missing: false
          show_line: true
          show_branch: true
          show_class_names: false
          only_changed_files: true
        if: github.event_name == 'pull_request' && needs.install-and-doctor.outputs.is_internal == 'true'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: install-and-doctor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore node modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run integration tests
        run: npm run test:integration -- --reporters=default --reporters=jest-junit

      - name: Integration tests summary
        uses: test-summary/action@v2
        with:
          paths: junit.xml
          output: integration-test-summary.md
        if: always()

      - name: Upload integration tests summary
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-summary
          path: integration-test-summary.md
        if: always()

  build-android:
    name: Build Android APK
    needs: install-and-doctor
    uses: ./.github/workflows/build-app.yml
    with:
      platform: android
      build-profile: test
      artifact-name: build-apk
      app-filename: recipedia-maestro.apk
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-ios:
    name: Build iOS App
    needs: install-and-doctor
    uses: ./.github/workflows/build-app.yml
    with:
      platform: ios
      build-profile: test
      artifact-name: build-ios-app
      app-filename: Recipedia.app
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-android-performance:
    name: Build Android APK (Performance)
    # Perf build needs the EAS perf dataset, so it can't use the fork fallback
    if: needs.install-and-doctor.outputs.is_internal == 'true'
    needs: install-and-doctor
    uses: ./.github/workflows/build-app.yml
    with:
      platform: android
      build-profile: perf
      artifact-name: build-apk-performance
      app-filename: recipedia-performance.apk
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  e2e-tests-android:
    name: E2E Tests (Android)
    needs: [ build-android, install-and-doctor ]
    uses: ./.github/workflows/e2e-maestro.yml
    with:
      platform: android
      app-artifact: build-apk
      # Forks lack QUITOQUE_*: drop the bulk-import, ocr and web suites
      suites: ${{ needs.install-and-doctor.outputs.is_internal == 'true' && '["app-init", "bulk-import", "duplicates-ingredient", "duplicates-recipe", "duplicates-tag", "ingredient-dialog", "ingredients-db", "menu", "ocr", "recipe-create", "recipe-readonly", "recipe-edit", "search", "settings", "shopping", "tags-db", "web", "web-edge-cases"]' || '["app-init", "duplicates-ingredient", "duplicates-recipe", "duplicates-tag", "ingredient-dialog", "ingredients-db", "menu", "recipe-create", "recipe-readonly", "recipe-edit", "search", "settings", "shopping", "tags-db", "web-edge-cases"]' }}
    secrets:
      QUITOQUE_USERNAME: ${{ secrets.QUITOQUE_USERNAME }}
      QUITOQUE_PASSWORD: ${{ secrets.QUITOQUE_PASSWORD }}

  # Delayed until the Android E2E matrix finishes so it doesn't compete with it
  # for runners. Uses always() so a flaky E2E failure still lets this run; only
  # requires the performance APK to have built.
  e2e-tests-android-performance:
    name: E2E Tests Android (Performance)
    needs: [ build-android-performance, e2e-tests-android ]
    if: ${{ always() && needs.build-android-performance.result == 'success' }}
    uses: ./.github/workflows/e2e-maestro.yml
    with:
      platform: android
      app-artifact: build-apk-performance
      suites: '["performance"]'

  e2e-tests-ios:
    name: E2E Tests (iOS)
    if: needs.install-and-doctor.outputs.is_internal == 'true'
    needs: [ build-ios, install-and-doctor ]
    uses: ./.github/workflows/e2e-maestro.yml
    with:
      platform: ios
      app-artifact: build-ios-app
      suites: '["app-init", "bulk-import", "duplicates-ingredient", "duplicates-recipe", "duplicates-tag", "ingredient-dialog", "ingredients-db", "menu", "ocr", "recipe-create", "recipe-readonly", "recipe-edit", "search", "settings", "shopping", "tags-db", "web", "web-edge-cases"]'
    secrets:
      QUITOQUE_USERNAME: ${{ secrets.QUITOQUE_USERNAME }}
      QUITOQUE_PASSWORD: ${{ secrets.QUITOQUE_PASSWORD }}

  merge-test-artifacts:
    name: Merge E2E Test Artifacts
    if: always()
    runs-on: ubuntu-latest
    needs: [ e2e-tests-android, e2e-tests-android-performance, e2e-tests-ios ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore node modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download all E2E JUnit reports
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: junit-e2e-*
          path: junit-reports
          merge-multiple: false

      - name: Download Android Maestro logs
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: maestro-logs-android-*
          path: maestro-logs-android
          merge-multiple: false

      - name: Download iOS Maestro logs
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: maestro-logs-ios-*
          path: maestro-logs-ios
          merge-multiple: false

      - name: Merge JUnit reports
        if: always()
        run: |
          mkdir -p merged-reports
          if find junit-reports -name '*.xml' -type f 2>/dev/null | grep -q .; then
            npx jrm merged-reports/report.xml "junit-reports/**/*.xml"
          else
            echo "No JUnit reports to merge"
          fi

      - name: Package Android Maestro logs
        if: always()
        run: bash .github/scripts/merge-maestro-logs.sh maestro-logs-android maestro-logs-android-merged

      - name: Package iOS Maestro logs
        if: always()
        run: bash .github/scripts/merge-maestro-logs.sh maestro-logs-ios maestro-logs-ios-merged

      - name: Delete individual suite artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            junit-e2e-*
            maestro-logs-android-*
            maestro-logs-ios-*
          failOnError: false

      - name: Upload merged JUnit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit-merged
          path: merged-reports/report.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Android Maestro logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-logs-android.zip
          path: maestro-logs-android-merged/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload iOS Maestro logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-logs-ios.zip
          path: maestro-logs-ios-merged/
          retention-days: 7
          if-no-files-found: ignore

  test-result-summary:
    name: Generate Test Result Summary
    # Posts a PR comment (needs pull-requests: write) which forks can't do
    if: always() && needs.install-and-doctor.outputs.is_internal == 'true'
    runs-on: ubuntu-latest
    needs: [ merge-test-artifacts, unit-tests-and-coverage, install-and-doctor ]
    steps:
      - name: Download unit test results
        if: always()
        uses: actions/download-artifact@v8
        with:
          name: unit-test-summary

      - name: Download merged E2E JUnit report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: e2e-junit-merged
          path: e2e-reports

      - name: Generate E2E test summary
        uses: test-summary/action@v2
        with:
          paths: e2e-reports/report.xml
          output: e2e-summary.md
        if: always()
        continue-on-error: true

      - name: Combine test summaries
        if: always()
        run: |
          echo "### 🧪 CI Test Results Summary" > full-summary.md
          echo "" >> full-summary.md
          echo "#### 🧩 Unit Tests" >> full-summary.md
          echo "" >> full-summary.md
          if [ -f unit-test-summary.md ]; then
            cat unit-test-summary.md >> full-summary.md
          else
            echo "⚠️ Unit test results not available" >> full-summary.md
          fi
          echo "" >> full-summary.md
          echo "#### 📱 E2E Tests (Android + iOS)" >> full-summary.md
          echo "" >> full-summary.md
          if [ -f e2e-summary.md ]; then
            cat e2e-summary.md >> full-summary.md
          else
            echo "⚠️ E2E test results not available" >> full-summary.md
          fi
          echo "" >> full-summary.md
          echo "_📊 Coverage for changed files is posted in a separate comment. View merged logs in the Actions tab._" >> full-summary.md

      - name: Comment test summary on PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: always()
        with:
          path: full-summary.md
