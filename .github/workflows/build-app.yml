name: Build App

# Uses an EAS signed build when EXPO_TOKEN is set (push / same-repo PRs), and
# falls back to a secret-free local build (gradlew / xcodebuild simulator) on
# fork PRs, which never receive secrets.

on:
  workflow_call:
    inputs:
      platform:
        description: 'Target platform (android or ios)'
        required: true
        type: string
      build-profile:
        description: 'EAS build profile'
        required: true
        type: string
      artifact-name:
        description: 'Name for the output artifact'
        required: true
        type: string
      app-filename:
        description: 'Filename for the app (APK or .app bundle)'
        required: true
        type: string
    secrets:
      EXPO_TOKEN:
        required: false

jobs:
  build:
    name: Build ${{ inputs.platform == 'ios' && 'iOS App' || 'APK' }} (${{ inputs.build-profile }})
    runs-on: ${{ inputs.platform == 'ios' && 'macos-15' || 'ubuntu-latest' }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Select Xcode 26
        if: inputs.platform == 'ios'
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files
        if: env.EXPO_TOKEN != ''
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            build_required:
              - 'src/**'
              - '${{ inputs.platform }}/**'
              - 'plugins/**'
              - 'modules/**'
              - 'app.json'
              - 'app.config.ts'
              - 'eas.json'
              - 'package.json'
              - 'package-lock.json'
              - 'metro.config.js'
              - 'babel.config.js'
              - 'tsconfig.json'
          base: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Restore node modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (for cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Python for Chaquopy
        if: inputs.platform == 'android'
        uses: ./.github/actions/setup-chaquopy-python

      - name: Build decision summary
        if: env.EXPO_TOKEN != ''
        env:
          PLATFORM_LABEL: ${{ inputs.platform == 'ios' && 'iOS app' || 'APK' }}
        run: |
          ./.github/scripts/build-decision.sh \
            "${{ inputs.build-profile }}" \
            "${{ steps.filter.outputs.build_required }}" \
            "${{ github.head_ref || github.ref_name }}" \
            "${{ github.ref }}" \
            "$PLATFORM_LABEL"

      - name: Find cached app
        if: |
          env.EXPO_TOKEN != '' &&
          steps.filter.outputs.build_required != 'true' &&
          github.ref != 'refs/heads/main' &&
          !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM_LABEL: ${{ inputs.platform == 'ios' && 'iOS app' || 'APK' }}
        run: |
          ./.github/scripts/find-cached-artifact.sh \
            "${{ inputs.artifact-name }}" \
            "build-test.yml" \
            "${{ github.head_ref || github.ref_name }}" \
            "$PLATFORM_LABEL"

      - name: Download cached app
        if: |
          env.EXPO_TOKEN != '' &&
          steps.filter.outputs.build_required != 'true' &&
          github.ref != 'refs/heads/main' &&
          !startsWith(github.ref, 'refs/tags/') &&
          env.CACHED_RUN_ID != ''
        continue-on-error: true
        id: download
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          run-id: ${{ env.CACHED_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Handle download failure
        if: |
          env.EXPO_TOKEN != '' &&
          steps.filter.outputs.build_required != 'true' &&
          github.ref != 'refs/heads/main' &&
          !startsWith(github.ref, 'refs/tags/') &&
          steps.download.outcome == 'failure'
        env:
          PLATFORM_LABEL: ${{ inputs.platform == 'ios' && 'iOS app' || 'APK' }}
        run: |
          echo "⚠️  Download failed → Will build fresh $PLATFORM_LABEL"
          echo "BUILD_FALLBACK=true" >> $GITHUB_ENV

      - name: Setup Android build environment
        if: |
          env.EXPO_TOKEN != '' && inputs.platform == 'android' && (
            steps.filter.outputs.build_required == 'true' ||
            github.ref == 'refs/heads/main' ||
            startsWith(github.ref, 'refs/tags/') ||
            env.BUILD_FALLBACK == 'true'
          )
        uses: ./.github/actions/setup-android-build
        with:
          eas-version: '16.3.0'
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup iOS build environment
        if: |
          env.EXPO_TOKEN != '' && inputs.platform == 'ios' && (
            steps.filter.outputs.build_required == 'true' ||
            github.ref == 'refs/heads/main' ||
            startsWith(github.ref, 'refs/tags/') ||
            env.BUILD_FALLBACK == 'true'
          )
        uses: ./.github/actions/setup-ios-build
        with:
          eas-version: '16.3.0'
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Build app (EAS)
        id: build-app
        if: |
          env.EXPO_TOKEN != '' && (
            steps.filter.outputs.build_required == 'true' ||
            github.ref == 'refs/heads/main' ||
            startsWith(github.ref, 'refs/tags/') ||
            env.BUILD_FALLBACK == 'true'
          )
        run: |
          set -o pipefail
          npm run build:${{ inputs.build-profile }}:${{ inputs.platform }} 2>&1 \
            | tee build-${{ inputs.platform }}.log

      - name: Upload build log
        if: always() && steps.build-app.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: build-log-${{ inputs.platform }}-${{ inputs.build-profile }}
          path: build-${{ inputs.platform }}.log
          retention-days: 7
          if-no-files-found: warn

      - name: Package Android APK
        if: |
          env.EXPO_TOKEN != '' && inputs.platform == 'android' && (
            steps.filter.outputs.build_required == 'true' ||
            github.ref == 'refs/heads/main' ||
            startsWith(github.ref, 'refs/tags/') ||
            env.BUILD_FALLBACK == 'true'
          )
        run: |
          mv build-*.apk ${{ inputs.app-filename }}
          echo "✅ APK built: ${{ inputs.app-filename }}"

      - name: Package iOS app bundle
        if: |
          env.EXPO_TOKEN != '' && inputs.platform == 'ios' && (
            steps.filter.outputs.build_required == 'true' ||
            github.ref == 'refs/heads/main' ||
            startsWith(github.ref, 'refs/tags/') ||
            env.BUILD_FALLBACK == 'true'
          )
        run: |
          # EAS local build outputs a .tar.gz archive
          TARBALL=$(find . -name "build-*.tar.gz" -type f | head -1)
          if [ -z "$TARBALL" ]; then
            echo "❌ No build tarball found!"
            exit 1
          fi
          echo "📦 Found build archive: $TARBALL"

          # Extract to temp directory to avoid naming conflicts
          mkdir -p _extracted
          tar -xzf "$TARBALL" -C _extracted

          # Find the .app bundle
          APP_PATH=$(find _extracted -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app bundle found after extraction!"
            exit 1
          fi
          echo "📱 Found app: $APP_PATH"

          mv "$APP_PATH" "${{ inputs.app-filename }}"
          zip -r "${{ inputs.app-filename }}.zip" "${{ inputs.app-filename }}"
          rm -rf _extracted
          echo "✅ iOS app built and packaged: ${{ inputs.app-filename }}.zip"

      - name: Setup Java 17 (fork build)
        if: env.EXPO_TOKEN == '' && inputs.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK without EXPO_TOKEN
        if: env.EXPO_TOKEN == '' && inputs.platform == 'android'
        # Match the EAS maestro profile env so Metro inlines the test dataset
        env:
          EXPO_PUBLIC_DATASET_TYPE: test
          EXPO_PUBLIC_DISABLE_ANIMATIONS: 'true'
        run: |
          npx expo prebuild --platform android --no-install
          (cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=x86_64)
          mv android/app/build/outputs/apk/release/app-release.apk "${{ inputs.app-filename }}"
          echo "✅ APK built: ${{ inputs.app-filename }}"

      - name: Build iOS app without EXPO_TOKEN
        if: env.EXPO_TOKEN == '' && inputs.platform == 'ios'
        # Match the EAS maestro profile env so Metro inlines the test dataset
        env:
          SCHEME: ${{ inputs.app-filename }}
          EXPO_PUBLIC_DATASET_TYPE: test
          EXPO_PUBLIC_DISABLE_ANIMATIONS: 'true'
        run: |
          SCHEME="${SCHEME%.app}"
          npx expo prebuild --platform ios --no-install
          npx pod-install
          xcodebuild \
            -workspace "ios/${SCHEME}.xcworkspace" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          mv "$APP_PATH" "${{ inputs.app-filename }}"
          zip -r "${{ inputs.app-filename }}.zip" "${{ inputs.app-filename }}"
          echo "✅ iOS app built and packaged: ${{ inputs.app-filename }}.zip"

      - name: Verify app availability
        env:
          PLATFORM_LABEL: ${{ inputs.platform == 'ios' && 'iOS app' || 'APK' }}
          APP_FILE: ${{ inputs.platform == 'ios' && format('{0}.zip', inputs.app-filename) || inputs.app-filename }}
        run: |
          if [ -f "$APP_FILE" ]; then
            if [ "${{ env.CACHED_RUN_ID }}" != "" ]; then
              echo "✅ Using cached $PLATFORM_LABEL from run #${{ env.CACHED_RUN_ID }}"
            else
              echo "✅ Using freshly built $PLATFORM_LABEL"
            fi
          else
            echo "❌ $APP_FILE not found!"
            exit 1
          fi

      - name: Upload app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.platform == 'ios' && format('{0}.zip', inputs.app-filename) || inputs.app-filename }}
          retention-days: 7
