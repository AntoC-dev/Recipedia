name: Publication

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Build & Test Pipeline" ]
    types:
      - completed
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  eas-release:
    runs-on: ${{ matrix.runner }}
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      matrix:
        platform: [ android, ios ]
        include:
          - platform: android
            runner: ubuntu-latest
          - platform: ios
            runner: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python for Chaquopy
        if: matrix.platform == 'android'
        uses: ./.github/actions/setup-chaquopy-python

      - name: Setup Android build environment
        if: matrix.platform == 'android'
        uses: ./.github/actions/setup-android-build
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup iOS build environment
        if: matrix.platform == 'ios'
        uses: ./.github/actions/setup-ios-build
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Fastlane
        if: matrix.platform == 'ios'
        run: gem install fastlane

      - name: Build for ${{ matrix.platform }}
        run: npm run build:prod:${{ matrix.platform }}

      - name: Submit to store (${{ matrix.platform }})
        run: npm run submit:${{ matrix.platform }}
