name: Performance Tests (Flashlight)

on:
  # Weekly on Thursday at 2 AM UTC (Monday avoided — Dependabot runs then).
  # The scheduled run is the one that gates on FPS regressions and tracks trend.
  schedule:
    - cron: '0 2 * * 4'

  # Manual trigger
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Test name for report identification'
        required: false
        default: 'manual-run'

# NOTE: this workflow does FPS profiling only. The per-PR smoke test that the perf
# flows still execute lives in build-test.yml (`e2e-tests-android-performance`,
# plain Maestro, ordered after the Android E2E matrix).

permissions:
  contents: read

jobs:
  check-new-commits:
    name: Check for New Commits
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for commits in the last week
        id: check
        run: |
          COMMITS=$(git log --oneline --since="7 days ago" | wc -l)
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            echo "Found $COMMITS commit(s) in the last 7 days"
          else
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
            echo "No commits in the last 7 days, skipping performance tests"
          fi

  build-performance-apk:
    name: Build Performance APK
    needs: [ check-new-commits ]
    # Run if: manual, OR scheduled with new commits in the week
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && needs.check-new-commits.outputs.has_new_commits == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python for Chaquopy
        uses: ./.github/actions/setup-chaquopy-python

      - name: Setup Android build environment
        uses: ./.github/actions/setup-android-build
        with:
          setup-android-sdk: 'true'
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Performance APK
        run: npm run build:perf:android

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: performance-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 1

  # Single emulator, screens measured sequentially. Not parallelised on purpose:
  # parallelism only buys wall-clock, at the cost of N emulators and re-seeding the
  # DB per screen. Seeding happens once (00_seed, first), the warm screens reuse
  # it, and each screen still produces its own separate report. A screen that fails
  # is retried once then skipped so the rest still run.
  flashlight-test:
    name: Run Flashlight Performance Tests
    needs: build-performance-apk
    runs-on: ubuntu-latest
    # Needs write access to append the run to the perf-data history branch and to
    # post a commit comment when a regression is detected.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: performance-apk

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Install Flashlight CLI
        run: curl https://get.flashlight.dev | bash

      - name: Setup Maestro CLI
        uses: dniHze/maestro-test-action@v1
        with:
          version: '2.6.0'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run perf screens
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 5
          emulator-options: -no-snapshot -no-window -noaudio -no-boot-anim -wipe-data -memory 4096 -cores 4
          # android-emulator-runner splits `script` on newlines and runs each
          # line via a separate `sh -c`, so the profiling loop lives in its own
          # file (run as one shell) — see run-perf-screens.sh.
          script: bash .github/scripts/run-perf-screens.sh "${{ steps.find-apk.outputs.apk_path }}"

      # Trend tracking via github-action-benchmark: it stores per-screen mean FPS
      # history on the perf-data branch, renders the trend charts, and comments on
      # the commit when a screen regresses. Scheduled runs only, for one clean
      # weekly point per commit. Regressions warn (comment) but never fail the build
      # — single-run emulator FPS is too noisy to hard-gate; Reassure is the
      # deterministic gate.
      - name: Emit benchmark input
        if: github.event_name == 'schedule'
        run: node .github/scripts/flashlight-benchmark.mjs perf-results perf-bench

      - name: Publish screen-FPS trend
        if: github.event_name == 'schedule'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Screen FPS
          tool: customBiggerIsBetter
          output-file-path: perf-bench/fps.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: perf-data
          benchmark-data-dir-path: dev/bench
          auto-push: true
          comment-on-alert: true
          fail-on-alert: false
          alert-threshold: '115%'

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-report
          path: |
            perf-reports/
            perf-results/
          retention-days: 30

      - name: Prepare Maestro logs
        if: always()
        run: bash .github/scripts/prepare-maestro-logs.sh maestro_logs_performance

      - name: Upload Maestro logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-logs-performance
          path: maestro_logs_performance.zip
          retention-days: 7
