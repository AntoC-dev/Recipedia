name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'README.md'
      - 'jsdoc.conf.json'
      - '.github/workflows/documentation.yml'
  # Redeploy after a weekly Performance run appends a new point to perf-data, so
  # the trend page picks up the latest data without a docs-source change.
  workflow_run:
    workflows: [ "Performance Tests (Flashlight)" ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate JSDoc Documentation
        run: npm run docs:build

      # Merge the performance trend charts into the docs site at /perf/. The charts
      # are generated by github-action-benchmark on the perf-data branch (dev/bench).
      # If that branch does not exist yet (before the first Performance run), the
      # checkout is skipped and /perf/ simply is not published.
      - name: Check out perf-data charts
        uses: actions/checkout@v7
        continue-on-error: true
        with:
          ref: perf-data
          path: perf-data

      - name: Copy performance charts into docs
        run: |
          if [ -d perf-data/dev/bench ]; then
            mkdir -p docs/perf
            cp -r perf-data/dev/bench/. docs/perf/
          else
            echo "No perf-data/dev/bench yet — skipping /perf/ until the first Performance run."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs'

  deploy-docs:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
