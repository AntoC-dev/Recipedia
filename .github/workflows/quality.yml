name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Cache node modules
        uses: actions/cache/save@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

  commit-validation:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    needs: install
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Validate commit messages
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run ESLint
        run: npm run lint

  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Check Prettier formatting
        run: npm run format:check

  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run TypeScript check
        run: npm run typecheck

  knip:
    name: Dead Code Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run Knip
        run: npm run knip:check

  expo-doctor:
    name: Expo Configuration Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run Expo Doctor
        run: npm run expo:doctor

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Security audit
        run: npm audit --audit-level=critical

  ci-scripts:
    name: CI Script Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Test CI gate scripts
        run: npm run test:scripts

  documentation:
    name: Documentation Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v7
      - name: Restore node modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Build documentation
        run: npm run docs:build

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: docs/
          retention-days: 7
