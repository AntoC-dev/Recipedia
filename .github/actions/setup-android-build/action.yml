name: 'Setup Android Build Environment'
description: 'Setup Java, Android SDK, Gradle caching, Expo caching, and EAS for Android builds (Python/Chaquopy set up by the caller)'

inputs:
  eas-version:
    description: 'EAS CLI version'
    required: false
    default: 'latest'
  expo-token:
    description: 'Expo token for EAS'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup ccache
      shell: bash
      run: |
        sudo apt-get install -y ccache
        ccache --set-config=max_size=2G
        echo "/usr/lib/ccache" >> $GITHUB_PATH

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Setup Gradle with caching
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-read-only: false
        build-scan-publish: false
        gradle-home-cache-cleanup: true

    - name: Cache global Expo artifacts
      uses: actions/cache@v4
      with:
        path: ~/.expo
        key: ${{ runner.os }}-expo-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-expo-

    - name: Cache Expo prebuild (Android native)
      uses: actions/cache@v4
      with:
        path: android
        key: ${{ runner.os }}-expo-prebuild-android-${{ hashFiles('app.json', 'app.config.ts', 'package-lock.json', 'plugins/**', 'modules/**') }}
        restore-keys: |
          ${{ runner.os }}-expo-prebuild-android-

    - name: Setup EAS
      uses: expo/expo-github-action@v8
      with:
        eas-version: ${{ inputs.eas-version }}
        packager: 'npm'
        token: ${{ inputs.expo-token }}
